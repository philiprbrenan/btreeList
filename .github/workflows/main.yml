# Test 2026-06-24 at 13:13:09

name: Test
run-name: btreeList

on:
  push:
    paths:
      - '**/main.yml'

#concurrency:
#  group: ${{ github.workflow }}-${{ github.ref }}
# cancel-in-progress: true

jobs:

  test:
    permissions: write-all
    runs-on: ubuntu-latest

    strategy:
      matrix:
        task: [BitSet, Branch, Leaf, Program, Slots, Test, Tree]

    steps:
    - uses: actions/checkout@v4
      with:
        ref: 'main'

    - name: 'JDK'
      uses: oracle-actions/setup-java@v1

    - name: Verilog install
      run: |
        sudo apt install iverilog yosys tree
        mkdir -p verilog


    - name: Position files in package
      run: |
        mkdir -p com/AppaApps/Silicon
        cp BitSet.java Branch.java Leaf.java Program.java Slots.java Test.java Tree.java com/AppaApps/Silicon
        tree

    - name: Java
      run: |
        javac -g -d Classes -cp Classes com/AppaApps/Silicon/*.java

    - name: Test BitSet
      if: ${{ always() && matrix.task == 'BitSet' }}
      run: |
        java -XX:+UseZGC -cp Classes com/AppaApps/Silicon/BitSet

    - name: Zip files
      if: ${{ always() && matrix.task == 'BitSet' }}
      run: |
        mv verilog/ BitSet-verilog/
        zip -r BitSet-verilog.zip BitSet-verilog/

    - name: Upload artifact
      if: ${{ always() && matrix.task == 'BitSet' }}
      uses: actions/upload-artifact@v4
      with:
        name: BitSet-verilog
        path: BitSet-verilog.zip

    - name: Test Branch
      if: ${{ always() && matrix.task == 'Branch' }}
      run: |
        java -XX:+UseZGC -cp Classes com/AppaApps/Silicon/Branch

    - name: Zip files
      if: ${{ always() && matrix.task == 'Branch' }}
      run: |
        mv verilog/ Branch-verilog/
        zip -r Branch-verilog.zip Branch-verilog/

    - name: Upload artifact
      if: ${{ always() && matrix.task == 'Branch' }}
      uses: actions/upload-artifact@v4
      with:
        name: Branch-verilog
        path: Branch-verilog.zip

    - name: Test Leaf
      if: ${{ always() && matrix.task == 'Leaf' }}
      run: |
        java -XX:+UseZGC -cp Classes com/AppaApps/Silicon/Leaf

    - name: Zip files
      if: ${{ always() && matrix.task == 'Leaf' }}
      run: |
        mv verilog/ Leaf-verilog/
        zip -r Leaf-verilog.zip Leaf-verilog/

    - name: Upload artifact
      if: ${{ always() && matrix.task == 'Leaf' }}
      uses: actions/upload-artifact@v4
      with:
        name: Leaf-verilog
        path: Leaf-verilog.zip

    - name: Test Program
      if: ${{ always() && matrix.task == 'Program' }}
      run: |
        java -XX:+UseZGC -cp Classes com/AppaApps/Silicon/Program

    - name: Zip files
      if: ${{ always() && matrix.task == 'Program' }}
      run: |
        mv verilog/ Program-verilog/
        zip -r Program-verilog.zip Program-verilog/

    - name: Upload artifact
      if: ${{ always() && matrix.task == 'Program' }}
      uses: actions/upload-artifact@v4
      with:
        name: Program-verilog
        path: Program-verilog.zip

    - name: Test Slots
      if: ${{ always() && matrix.task == 'Slots' }}
      run: |
        java -XX:+UseZGC -cp Classes com/AppaApps/Silicon/Slots

    - name: Zip files
      if: ${{ always() && matrix.task == 'Slots' }}
      run: |
        mv verilog/ Slots-verilog/
        zip -r Slots-verilog.zip Slots-verilog/

    - name: Upload artifact
      if: ${{ always() && matrix.task == 'Slots' }}
      uses: actions/upload-artifact@v4
      with:
        name: Slots-verilog
        path: Slots-verilog.zip

    - name: Test Test
      if: ${{ always() && matrix.task == 'Test' }}
      run: |
        java -XX:+UseZGC -cp Classes com/AppaApps/Silicon/Test

    - name: Zip files
      if: ${{ always() && matrix.task == 'Test' }}
      run: |
        mv verilog/ Test-verilog/
        zip -r Test-verilog.zip Test-verilog/

    - name: Upload artifact
      if: ${{ always() && matrix.task == 'Test' }}
      uses: actions/upload-artifact@v4
      with:
        name: Test-verilog
        path: Test-verilog.zip

    - name: Test Tree
      if: ${{ always() && matrix.task == 'Tree' }}
      run: |
        java -XX:+UseZGC -cp Classes com/AppaApps/Silicon/Tree

    - name: Zip files
      if: ${{ always() && matrix.task == 'Tree' }}
      run: |
        mv verilog/ Tree-verilog/
        zip -r Tree-verilog.zip Tree-verilog/

    - name: Upload artifact
      if: ${{ always() && matrix.task == 'Tree' }}
      uses: actions/upload-artifact@v4
      with:
        name: Tree-verilog
        path: Tree-verilog.zip
