# Test 2026-07-22 at 04:46:11

name: Test
run-name: btreeList

on:
  push:
    paths:
      - '**/main.yml'

#concurrency:
#  group: ${{ github.workflow }}-${{ github.ref }}
# cancel-in-progress: true

jobs:

  test:
    permissions: write-all
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        task: [Slots_1, Slots_2, Slots_3, Slots_4, Slots_5, Slots_6, Slots_7, Slots_8, Slots_9, Slots_10, Slots_11, Slots_12, Slots_13, Slots_14, Slots_15, Slots_16, Slots_17, Slots_18, Slots_19, Slots_20, Slots_21, Slots_22, Slots_23]

    steps:
    - uses: actions/checkout@v6
      with:
        ref: 'main'

    - name: 'JDK'
      uses: oracle-actions/setup-java@v1

    - name: Install
      run: |
        sudo apt install iverilog yosys tree # openjdk-25-jdk
        mkdir -p verilog

    - name: Verilog Programmable Interface
      run: |
        cd vpi
        iverilog-vpi wall_time.c
        ls -la

    - name: Position files in package
      run: |
        mkdir -p com/AppaApps/Silicon
        cp BitSet.java Branch.java Leaf.java Program.java Slots.java Test.java Tree.java com/AppaApps/Silicon
        tree

    - name: Java
      run: |
        java --version
        javac --version
        javac -g -d Classes -cp Classes com/AppaApps/Silicon/*.java

    - name: Slots_1
      if: ${{             matrix.task == 'Slots_1' }}
      run: |
        java -XX:+UseZGC -cp Classes com/AppaApps/Silicon/Slots 1
        tree

    - name: Upload Slots_1
      if: ${{ always() && matrix.task == 'Slots_1' }}
      uses: actions/upload-artifact@v7
      with:
        name: Slots_1
        path: verilog
        if-no-files-found: ignore

    - name: Slots_2
      if: ${{             matrix.task == 'Slots_2' }}
      run: |
        java -XX:+UseZGC -cp Classes com/AppaApps/Silicon/Slots 2
        tree

    - name: Upload Slots_2
      if: ${{ always() && matrix.task == 'Slots_2' }}
      uses: actions/upload-artifact@v7
      with:
        name: Slots_2
        path: verilog
        if-no-files-found: ignore

