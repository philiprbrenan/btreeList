# Test 2026-03-06 at 01:05:33

name: Test
run-name: btreeList

on:
  push:
    paths:
      - '**/main.yml'

#concurrency:
#  group: ${{ github.workflow }}-${{ github.ref }}
# cancel-in-progress: true

jobs:

  test:
    permissions: write-all
    runs-on: ubuntu-latest

    strategy:
      matrix:
        task: [BitSet, Btree, Slots, Syntax, Test, Tree]

    steps:
    - uses: actions/checkout@v4
      with:
        ref: 'main'

    - name: 'JDK'
      uses: oracle-actions/setup-java@v1

    - name: Verilog install
      run: |
        sudo apt install iverilog yosys tree

    - name: Position files in package
      run: |
        mkdir -p com/AppaApps/Silicon
        cp BitSet.java Btree.java Slots.java Syntax.java Test.java Tree.java com/AppaApps/Silicon
        tree

    - name: Java
      run: |
        javac -g -d Classes -cp Classes com/AppaApps/Silicon/*.java

    - name: Test BitSet
      if: matrix.task == 'BitSet'
      run: |
        java -XX:+UseZGC -cp Classes com/AppaApps/Silicon/BitSet


    - name: Test Btree
      if: matrix.task == 'Btree'
      run: |
        java -XX:+UseZGC -cp Classes com/AppaApps/Silicon/Btree


    - name: Test Slots
      if: matrix.task == 'Slots'
      run: |
        java -XX:+UseZGC -cp Classes com/AppaApps/Silicon/Slots


    - name: Test Syntax
      if: matrix.task == 'Syntax'
      run: |
        java -XX:+UseZGC -cp Classes com/AppaApps/Silicon/Syntax


    - name: Test Test
      if: matrix.task == 'Test'
      run: |
        java -XX:+UseZGC -cp Classes com/AppaApps/Silicon/Test


    - name: Test Tree
      if: matrix.task == 'Tree'
      run: |
        java -XX:+UseZGC -cp Classes com/AppaApps/Silicon/Tree

