# Test 2026-06-24 at 23:04:52

name: Test
run-name: btreeList

on:
  push:
    paths:
      - '**/main.yml'

#concurrency:
#  group: ${{ github.workflow }}-${{ github.ref }}
# cancel-in-progress: true

jobs:

  test:
    permissions: write-all
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        task: [BitSet_1, BitSet_2, BitSet_3, BitSet_4, BitSet_5, BitSet_6, BitSet_7, BitSet_8, BitSet_9, BitSet_10, BitSet_11]

    steps:
    - uses: actions/checkout@v4
      with:
        ref: 'main'

    - name: 'JDK'
      uses: oracle-actions/setup-java@v1

    - name: Verilog install
      run: |
        sudo apt install iverilog yosys tree
        mkdir -p verilog


    - name: Position files in package
      run: |
        mkdir -p com/AppaApps/Silicon
        cp BitSet.java Branch.java Leaf.java Program.java Slots.java Test.java Tree.java com/AppaApps/Silicon
        tree

    - name: Java
      run: |
        javac -g -d Classes -cp Classes com/AppaApps/Silicon/*.java

    - name: BitSet_1
      if: ${{             matrix.task == 'BitSet_1' }}
      run: |
        java -XX:+UseZGC -cp Classes com/AppaApps/Silicon/BitSet 1
        tree

    - name: Upload BitSet_1
      if: ${{ always() && matrix.task == 'BitSet_1' }}
      uses: actions/upload-artifact@v4
      with:
        name: BitSet_1
        path: verilog/BitSet/1/

    - name: BitSet_2
      if: ${{             matrix.task == 'BitSet_2' }}
      run: |
        java -XX:+UseZGC -cp Classes com/AppaApps/Silicon/BitSet 2
        tree

    - name: Upload BitSet_2
      if: ${{ always() && matrix.task == 'BitSet_2' }}
