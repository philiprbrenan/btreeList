# Test 2026-06-27 at 01:38:06

name: Test
run-name: btreeList

on:
  push:
    paths:
      - '**/main.yml'

#concurrency:
#  group: ${{ github.workflow }}-${{ github.ref }}
# cancel-in-progress: true

jobs:

  test:
    permissions: write-all
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        task: [Slots_1, Slots_2, Slots_3, Slots_4, Slots_5, Slots_6, Slots_7, Slots_8, Slots_9, Slots_10, Slots_11, Slots_12, Slots_13, Slots_14, Slots_15, Slots_16, Slots_17, Slots_18, Slots_19, Slots_20, Slots_21, Slots_22, Slots_23]

    steps:
    - uses: actions/checkout@v6
      with:
        ref: 'main'

    - name: 'JDK'
      uses: oracle-actions/setup-java@v1

    - name: Verilog install
      run: |
        sudo apt install iverilog yosys tree
        mkdir -p verilog


    - name: Position files in package
      run: |
        mkdir -p com/AppaApps/Silicon
        cp BitSet.java Branch.java Leaf.java Program.java Slots.java Test.java Tree.java com/AppaApps/Silicon
        tree

    - name: Java
      run: |
        javac -g -d Classes -cp Classes com/AppaApps/Silicon/*.java

    - name: Slots_7
      if: ${{             matrix.task == 'Slots_7' }}
      run: |
        java -XX:+UseZGC -cp Classes com/AppaApps/Silicon/Slots 7
        tree

    - name: Upload Slots_7
      if: ${{ always() && matrix.task == 'Slots_7' }}
      uses: actions/upload-artifact@v7
      with:
        name: Slots_7
        path: verilog

    - name: Slots_8
      if: ${{             matrix.task == 'Slots_8' }}
      run: |
        java -XX:+UseZGC -cp Classes com/AppaApps/Silicon/Slots 8
        tree

    - name: Upload Slots_8
      if: ${{ always() && matrix.task == 'Slots_8' }}
      uses: actions/upload-artifact@v7
      with:
        name: Slots_8
        path: verilog

    - name: Slots_9
      if: ${{             matrix.task == 'Slots_9' }}
      run: |
        java -XX:+UseZGC -cp Classes com/AppaApps/Silicon/Slots 9
        tree

    - name: Upload Slots_9
      if: ${{ always() && matrix.task == 'Slots_9' }}
      uses: actions/upload-artifact@v7
      with:
        name: Slots_9
        path: verilog
