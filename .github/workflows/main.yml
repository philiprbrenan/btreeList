# Test 2026-06-26 at 04:33:01

name: Test
run-name: btreeList

on:
  push:
    paths:
      - '**/main.yml'

#concurrency:
#  group: ${{ github.workflow }}-${{ github.ref }}
# cancel-in-progress: true

jobs:

  test:
    permissions: write-all
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        task: [Tree_1, Tree_2, Tree_3, Tree_4, Tree_5, Tree_6, Tree_7, Tree_8, Tree_9, Tree_10, Tree_11]

    steps:
    - uses: actions/checkout@v6
      with:
        ref: 'main'

    - name: 'JDK'
      uses: oracle-actions/setup-java@v1

    - name: Verilog install
      run: |
        sudo apt install iverilog yosys tree
        mkdir -p verilog


    - name: Position files in package
      run: |
        mkdir -p com/AppaApps/Silicon
        cp BitSet.java Branch.java Leaf.java Program.java Slots.java Test.java Tree.java com/AppaApps/Silicon
        tree

    - name: Java
      run: |
        javac -g -d Classes -cp Classes com/AppaApps/Silicon/*.java

    - name: Tree_7
      if: ${{             matrix.task == 'Tree_7' }}
      run: |
        java -XX:+UseZGC -cp Classes com/AppaApps/Silicon/Tree 7
        tree

    - name: Upload Tree_7
      if: ${{ always() && matrix.task == 'Tree_7' }}
      uses: actions/upload-artifact@v7
      with:
        name: Tree_7
        path: verilog

    - name: Tree_8
      if: ${{             matrix.task == 'Tree_8' }}
      run: |
        java -XX:+UseZGC -cp Classes com/AppaApps/Silicon/Tree 8
        tree

    - name: Upload Tree_8
      if: ${{ always() && matrix.task == 'Tree_8' }}
      uses: actions/upload-artifact@v7
      with:
        name: Tree_8
        path: verilog

    - name: Tree_9
      if: ${{             matrix.task == 'Tree_9' }}
      run: |
        java -XX:+UseZGC -cp Classes com/AppaApps/Silicon/Tree 9
        tree

    - name: Upload Tree_9
      if: ${{ always() && matrix.task == 'Tree_9' }}
      uses: actions/upload-artifact@v7
      with:
        name: Tree_9
        path: verilog
