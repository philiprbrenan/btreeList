# Test 2026-06-24 at 16:15:01

name: Test
run-name: btreeList

on:
  push:
    paths:
      - '**/main.yml'

#concurrency:
#  group: ${{ github.workflow }}-${{ github.ref }}
# cancel-in-progress: true

jobs:

  test:
    permissions: write-all
    runs-on: ubuntu-latest

    strategy:
      matrix:
        task: [BitSet, Branch, Leaf, Program, Slots, Test, Tree_1, Tree_2, Tree_3, Tree_4, Tree_5, Tree_6, Tree_7, Tree_8, Tree_9, Tree_10, Tree_11]

    steps:
    - uses: actions/checkout@v4
      with:
        ref: 'main'

    - name: 'JDK'
      uses: oracle-actions/setup-java@v1

    - name: Verilog install
      run: |
        sudo apt install iverilog yosys tree
        mkdir -p verilog


    - name: Position files in package
      run: |
        mkdir -p com/AppaApps/Silicon
        cp BitSet.java Branch.java Leaf.java Program.java Slots.java Test.java Tree.java com/AppaApps/Silicon
        tree

    - name: Java
      run: |
        javac -g -d Classes -cp Classes com/AppaApps/Silicon/*.java

    - name: BitSet
      if: ${{ always() && matrix.task == 'BitSet' }}
      run: |
        echo "java -XX:+UseZGC -cp Classes com/AppaApps/Silicon/BitSet 1"

    - name: Upload BitSet
      if: ${{ always() && matrix.task == 'BitSet' }}
      uses: actions/upload-artifact@v4
      with:
        name: BitSet
        path: verilog/BitSet/

    - name: Branch
      if: ${{ always() && matrix.task == 'Branch' }}
      run: |
        echo "java -XX:+UseZGC -cp Classes com/AppaApps/Silicon/Branch 1"

    - name: Upload Branch
      if: ${{ always() && matrix.task == 'Branch' }}
      uses: actions/upload-artifact@v4
      with:
        name: Branch
        path: verilog/Branch/

    - name: Leaf
