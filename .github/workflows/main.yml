# Test 2026-07-21 at 02:34:29

name: Test
run-name: btreeList

on:
  push:
    paths:
      - '**/main.yml'

#concurrency:
#  group: ${{ github.workflow }}-${{ github.ref }}
# cancel-in-progress: true

jobs:

  test:
    permissions: write-all
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        task: [Program_1]

    steps:
    - uses: actions/checkout@v6
      with:
        ref: 'main'

#    - name: 'JDK'
#      uses: oracle-actions/setup-java@v1

    - name: Install
      run: |
        sudo apt install iverilog yosys tree openjdk-25-jdk
        mkdir -p verilog


    - name: Position files in package
      run: |
        mkdir -p com/AppaApps/Silicon
        cp BitSet.java Branch.java Leaf.java Program.java Slots.java Test.java Tree.java com/AppaApps/Silicon
        tree

    - name: Java
      run: |
        javac -g -d Classes -cp Classes com/AppaApps/Silicon/*.java

    - name: Program_1
      if: ${{             matrix.task == 'Program_1' }}
      run: |
        java -XX:+UseZGC -cp Classes com/AppaApps/Silicon/Program 1
        tree

    - name: Upload Program_1
      if: ${{ always() && matrix.task == 'Program_1' }}
      uses: actions/upload-artifact@v7
      with:
        name: Program_1
        path: verilog
        if-no-files-found: ignore
